# Alembic single-database configuration for Genovate.
#
# The runtime DB schema is also created on startup by
# `app/core/database.py::_init_schema` (idempotent CREATE TABLE IF NOT EXISTS)
# so the application can boot against an empty database without a separate
# migration step. Alembic is configured here for production / future schema
# evolution where versioned migrations are required.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg2://genovate:genovate123@localhost:5432/genovate
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
